<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二聪点名器 ☀️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #FFE4B5 0%, #FFDAB9 50%, #FFF5E1 100%);
            color: #333333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(255, 200, 150, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 180, 180, 0.2) 0%, transparent 50%);
            z-index: -1;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 28px;
            padding: 40px;
            box-shadow:
                0 20px 60px rgba(255, 150, 100, 0.15),
                0 10px 30px rgba(255, 180, 150, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 200, 180, 0.4);
            position: relative;
            overflow: hidden;
        }

        .container::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #FFB74D, #FF8A65, #FFD54F, #FFB74D);
            z-index: -1;
            border-radius: 30px;
            opacity: 0.2;
            filter: blur(12px);
        }

        h1 {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 10px;
            color: #5D4037;
            text-shadow: 0 4px 12px rgba(255, 150, 100, 0.3);
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            font-size: 1.1rem;
            color: #666666;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .name-display {
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid rgba(255, 180, 150, 0.5);
            border-radius: 24px;
            padding: 40px 20px;
            margin: 30px 0;
            text-align: center;
            font-size: 3.5rem;
            font-weight: 700;
            color: #333333;
            min-height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
            box-shadow:
                inset 0 0 20px rgba(255, 200, 180, 0.3),
                0 15px 40px rgba(255, 150, 100, 0.2),
                0 5px 15px rgba(255, 180, 150, 0.3);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .name-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #FFB74D, #FF8A65, #FFD54F);
        }

        .name-display.rolling {
            animation: pulse 1.5s infinite alternate;
            color: #FF5722;
            border-color: rgba(255, 87, 34, 0.6);
            text-shadow: 0 0 15px rgba(255, 87, 34, 0.5);
        }

        @keyframes pulse {
            0% { box-shadow: inset 0 0 20px rgba(255, 200, 180, 0.3), 0 15px 40px rgba(255, 150, 100, 0.2), 0 0 20px rgba(255, 87, 34, 0.3); }
            100% { box-shadow: inset 0 0 20px rgba(255, 200, 180, 0.5), 0 15px 40px rgba(255, 150, 100, 0.3), 0 0 40px rgba(255, 87, 34, 0.6); }
        }

        /* 名字卡片容器 */
        .name-card {
            position: relative;
            cursor: pointer;
            margin: 30px 0;
            perspective: 1000px; /* 为3D翻转效果提供透视 */
        }

        .name-card:hover .name-display {
            transform: translateY(-8px) scale(1.02);
            box-shadow:
                inset 0 0 25px rgba(255, 200, 180, 0.4),
                0 20px 50px rgba(255, 150, 100, 0.3),
                0 0 40px rgba(255, 87, 34, 0.4);
            border-color: rgba(255, 87, 34, 0.7);
        }

        /* 卡片提示文字 */
        .card-hint {
            text-align: center;
            margin-top: 15px;
            font-size: 1rem;
            color: #666666;
            opacity: 0.8;
            transition: opacity 0.3s, transform 0.3s;
        }

        .name-card:hover .card-hint {
            opacity: 1;
            transform: translateY(-3px);
            color: #FF5722;
        }

        /* 卡片翻转动画 */
        .name-card.flipping .name-display {
            animation: flip 0.6s ease-in-out;
        }

        @keyframes flip {
            0% { transform: rotateY(0); }
            50% { transform: rotateY(180deg); }
            100% { transform: rotateY(360deg); }
        }

        /* 转盘旋转动画 */
        .name-card.spinning .name-display {
            animation: spin 0.3s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotateY(0); }
            100% { transform: rotateY(360deg); }
        }



        /* 总人数区域 */
        .total-count {
            margin-top: 40px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            border: 2px solid rgba(255, 180, 150, 0.5);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 25px rgba(255, 150, 100, 0.15);
        }

        .total-count:hover {
            background: rgba(255, 255, 255, 0.95);
            border-color: #FF8A65;
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 12px 35px rgba(255, 150, 100, 0.25);
        }

        .total-count .label {
            font-size: 1.1rem;
            color: #5D4037;
            font-weight: 600;
        }

        .total-count .count {
            font-size: 1.4rem;
            font-weight: bold;
            color: #FF5722;
            text-shadow: 0 2px 8px rgba(255, 87, 34, 0.3);
        }

        /* 名单编辑面板 */
        .edit-panel {
            margin-top: 20px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            border: 2px solid rgba(255, 180, 150, 0.5);
            display: none; /* 默认隐藏 */
            box-shadow: 0 10px 35px rgba(255, 150, 100, 0.2);
        }

        .edit-panel.show {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .edit-panel h3 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #5D4037;
        }

        .edit-panel .instructions {
            font-size: 0.95rem;
            color: #666666;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        #nameListTextarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid rgba(255, 180, 150, 0.6);
            border-radius: 12px;
            color: #333333;
            font-size: 1rem;
            line-height: 1.5;
            resize: vertical;
            font-family: 'Segoe UI', 'Microsoft YaHei', monospace;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 8px rgba(255, 200, 180, 0.3);
        }

        #nameListTextarea:focus {
            outline: none;
            border-color: #FF8A65;
            box-shadow: 0 0 0 3px rgba(255, 138, 101, 0.3), inset 0 2px 8px rgba(255, 200, 180, 0.3);
        }

        .edit-buttons {
            display: flex;
            gap: 15px;
        }

        .edit-btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        #saveNamesBtn {
            background: linear-gradient(135deg, #FF8A65, #FF5722);
            color: white;
        }

        #saveNamesBtn:hover {
            background: linear-gradient(135deg, #FF7043, #F4511E);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 25px rgba(255, 87, 34, 0.4);
        }

        #resetNamesBtn {
            background: linear-gradient(135deg, #4DB6AC, #26A69A);
            color: white;
        }

        #resetNamesBtn:hover {
            background: linear-gradient(135deg, #26A69A, #00897B);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 25px rgba(38, 166, 154, 0.4);
        }

        .history {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid rgba(255, 180, 150, 0.4);
        }

        .history h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #5D4037;
        }

        #historyList {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 14px;
            border: 1px solid rgba(255, 180, 150, 0.4);
        }

        #historyList li {
            background: linear-gradient(135deg, #FFE0B2, #FFCCBC);
            padding: 10px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 150, 100, 0.4);
            color: #5D4037;
            box-shadow: 0 4px 12px rgba(255, 150, 100, 0.15);
            transition: all 0.3s;
        }

        #historyList li:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(255, 150, 100, 0.25);
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: #666666;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
                border-radius: 20px;
            }

            h1 {
                font-size: 2.2rem;
            }

            .name-display {
                font-size: 2.8rem;
                padding: 30px 15px;
                min-height: 150px;
            }

        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }

            .name-display {
                font-size: 2.2rem;
                min-height: 120px;
            }

        }
    </style>
</head>
<body>
    <div class="container">
        <h1>二聪点名器 ☀️</h1>
        <p class="subtitle">点击名字卡片开始随机点名，再次点击停止并显示结果 🎲</p>

        <!-- 可点击的名字卡片区域 -->
        <div class="name-card" id="nameCard">
            <div class="name-display" id="nameDisplay">
                准备开始 🌟
            </div>
            <div class="card-hint">点击卡片开始/停止 ✨</div>
        </div>

        <!-- 总人数显示和名单编辑区域 -->
        <div class="total-count" id="totalCount">
            <div class="label">总人数 👥</div>
            <div class="count" id="totalCountNumber">5 人</div>
        </div>

        <div class="edit-panel" id="editPanel">
            <h3>编辑名单 ✏️</h3>
            <p class="instructions">请在下方输入框中修改名单，每个名字用逗号分隔（支持中英文逗号 ,，）。修改后点击"保存名单"按钮生效。📝</p>
            <textarea id="nameListTextarea" placeholder="例如：李宇博,杨子杨,白瑞,徐景涛,左昶胜"></textarea>
            <div class="edit-buttons">
                <button class="edit-btn" id="saveNamesBtn">保存名单 💾</button>
                <button class="edit-btn" id="resetNamesBtn">恢复默认 🔄</button>
            </div>
        </div>

        <div class="history">
            <h3>点名历史 📜</h3>
            <ul id="historyList"></ul>
        </div>
    </div>

    <div class="footer">
        二聪点名器 ☀️ &copy; 2026 | 设计：阳光活力风
    </div>

    <script>
        // 示例名字列表（可以替换）
        let nameList = [
            '李宇博', '杨子杨', '白瑞', '徐景涛', '左昶胜'
        ];

        // 获取DOM元素
        const nameDisplay = document.getElementById('nameDisplay');
        const nameCard = document.getElementById('nameCard');
        const historyList = document.getElementById('historyList');
        const totalCountNumber = document.getElementById('totalCountNumber');
        const totalCount = document.getElementById('totalCount');
        const editPanel = document.getElementById('editPanel');
        const nameListTextarea = document.getElementById('nameListTextarea');
        const saveNamesBtn = document.getElementById('saveNamesBtn');
        const resetNamesBtn = document.getElementById('resetNamesBtn');

        // 变量初始化
        let isRolling = false;
        let rollInterval;
        let rollSpeed = 80; // 初始滚动速度（毫秒）
        let history = [];
        let isEditPanelOpen = false;

        // 初始化函数：更新总人数显示和文本域内容
        function initialize() {
            updateTotalCount();
            updateTextarea();
            // 初始显示一个随机名字
            nameDisplay.textContent = getRandomName();
            // 初始添加一个历史记录示例
            addToHistory('示例名字');
        }

        // 更新总人数显示
        function updateTotalCount() {
            totalCountNumber.textContent = `${nameList.length} 人`;
        }

        // 更新文本域内容（将数组转换为逗号分隔字符串）
        function updateTextarea() {
            nameListTextarea.value = nameList.join(', ');
        }

        // 从文本域解析名字列表（处理逗号分隔，去除空格和空值）
        function parseNameListFromTextarea() {
            const text = nameListTextarea.value.trim();
            if (!text) return [];

            // 兼容中英文逗号：使用正则表达式分割，支持英文逗号(,)和中文逗号(，)
            return text.split(/[,，]/)
                .map(name => name.trim())
                .filter(name => name.length > 0);
        }

        // 随机选择一个名字
        function getRandomName() {
            return nameList[Math.floor(Math.random() * nameList.length)];
        }

        // 开始滚动名字 - 修改为点击卡片触发
        function startRolling() {
            if (isRolling) return;
            if (nameList.length === 0) {
                alert('名单为空，请先添加名字！');
                return;
            }

            isRolling = true;
            // 添加滚动动画效果
            nameDisplay.classList.add('rolling');
            nameCard.classList.add('spinning'); // 添加旋转动画

            // 逐渐加速效果
            let speed = 200;
            rollInterval = setInterval(() => {
                nameDisplay.textContent = getRandomName();
                // 每5次切换添加一次翻转效果
                if (Math.random() > 0.8) {
                    nameCard.classList.add('flipping');
                    setTimeout(() => nameCard.classList.remove('flipping'), 600);
                }
                // 逐渐加速到最快速度
                if (speed > rollSpeed) {
                    speed -= 10;
                    clearInterval(rollInterval);
                    rollInterval = setInterval(() => {
                        nameDisplay.textContent = getRandomName();
                        // 随机添加翻转效果
                        if (Math.random() > 0.85) {
                            nameCard.classList.add('flipping');
                            setTimeout(() => nameCard.classList.remove('flipping'), 600);
                        }
                    }, speed);
                }
            }, speed);
        }

        // 停止滚动并显示结果
        function stopRolling() {
            if (!isRolling) return;

            clearInterval(rollInterval);
            isRolling = false;
            nameDisplay.classList.remove('rolling');
            nameCard.classList.remove('spinning'); // 移除旋转动画

            // 随机选择最终名字（确保不是立即停止）
            const finalName = getRandomName();
            nameDisplay.textContent = finalName;

            // 最终翻转效果
            nameCard.classList.add('flipping');
            setTimeout(() => nameCard.classList.remove('flipping'), 600);

            // 添加到历史记录
            addToHistory(finalName);

            // 添加庆祝效果
            celebrate(finalName);
        }

        // 添加到历史记录
        function addToHistory(name) {
            const now = new Date();
            const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

            history.unshift({ name, time: timeString });

            // 更新历史列表显示
            historyList.innerHTML = '';
            history.slice(0, 10).forEach(item => {
                const li = document.createElement('li');
                li.textContent = `${item.name} (${item.time})`;
                historyList.appendChild(li);
            });

            // 限制历史记录数量
            if (history.length > 10) {
                history = history.slice(0, 10);
            }
        }

        // 庆祝效果
        function celebrate(name) {
            // 改变显示框颜色短暂时间，使用暖色调
            nameDisplay.style.color = '#FF5722';
            nameDisplay.style.borderColor = 'rgba(255, 87, 34, 0.7)';
            nameDisplay.style.textShadow = '0 0 25px rgba(255, 87, 34, 0.8)';

            setTimeout(() => {
                nameDisplay.style.color = '';
                nameDisplay.style.borderColor = '';
                nameDisplay.style.textShadow = '';
            }, 1500);
        }

        // 切换编辑面板的展开/收起
        function toggleEditPanel() {
            isEditPanelOpen = !isEditPanelOpen;
            if (isEditPanelOpen) {
                editPanel.classList.add('show');
                // 将当前名单加载到文本域
                updateTextarea();
            } else {
                editPanel.classList.remove('show');
            }
        }

        // 保存名单
        function saveNameList() {
            const newNameList = parseNameListFromTextarea();
            if (newNameList.length === 0) {
                alert('名单不能为空！');
                return;
            }
            nameList = newNameList;
            updateTotalCount();
            alert(`名单已更新，共 ${nameList.length} 人`);
            // 无论是否滚动，都更新显示的名字
            nameDisplay.textContent = getRandomName();
            // 添加一个视觉反馈：名字卡片短暂闪烁
            nameCard.classList.add('flipping');
            setTimeout(() => nameCard.classList.remove('flipping'), 600);
        }

        // 恢复默认名单
        function resetNameList() {
            nameList = [
                '李宇博', '杨子杨', '白瑞', '徐景涛', '左昶胜'
            ];
            updateTotalCount();
            updateTextarea();
            // 更新显示的名字
            nameDisplay.textContent = getRandomName();
            // 添加视觉反馈
            nameCard.classList.add('flipping');
            setTimeout(() => nameCard.classList.remove('flipping'), 600);
            alert('已恢复默认名单');
        }

        // 事件监听器
        // 卡片点击事件：开始/停止点名
        nameCard.addEventListener('click', function() {
            if (isRolling) {
                stopRolling();
            } else {
                startRolling();
            }
        });

        // 总人数区域点击事件：展开/收起编辑面板
        totalCount.addEventListener('click', toggleEditPanel);

        // 保存名单按钮点击事件
        saveNamesBtn.addEventListener('click', saveNameList);

        // 恢复默认按钮点击事件
        resetNamesBtn.addEventListener('click', resetNameList);

        // 添加键盘支持：空格键控制开始/停止
        document.addEventListener('keydown', function(event) {
            if (event.code === 'Space') {
                event.preventDefault(); // 防止空格键滚动页面
                if (isRolling) {
                    stopRolling();
                } else {
                    startRolling();
                }
            }
        });

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initialize);
    </script>
</body>
</html>
